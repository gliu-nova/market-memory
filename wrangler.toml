# Must match your Cloudflare Pages project name
name = "market-memory"
compatibility_date = "2026-06-10"
pages_build_output_dir = "public"

[[d1_databases]]
binding = "DB"
database_name = "market-memory"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[vars]
ENVIRONMENT = "production"
APP_NAME = "Market Memory"

[env.preview.vars]
ENVIRONMENT = "preview"

# Secrets (set in dashboard or via wrangler pages secret put):
#   INGEST_SECRET — optional bearer token for POST /ingest